    <main class="formPage">
      <div id="left-container">
          <h1>Signup Form</h1>
          <div id="welcomeMessage">
              <p>Hi, 👋 dear!</p>
              <p>Please fill out the form to get started.</p>
          </div>
      </div>
      <div id="right-container">
          <form id="myForm" method="get" action="record.html">
              <label for="username">Username:</label>
              <input type="text" id="username" name="username" required />

              <label for="password">Password:</label>
              <input type="password" id="password" name="password" required pattern="[a-zA-Z0-9]{8,}" />

              <label for="confirmPassword">Confirm Password:</label>
              <input type="password" id="confirmPassword" name="confirmPassword" required />

              <label for="email">Email:</label>
              <input type="email" id="email" name="email" required pattern="[a-zA-Z0-9._%+-]+@byui\.edu$" />
              <span id="emailError" class="error">Please enter a valid email address.</span>

              <label for="pageRating">Page Rating:</label>
              <p>😊 <span id="ratingValue">0</span></p> 
              <input type="range" id="pageRating" name="pageRating" min="1" max="10" step="1" />

              <button type="submit">Submit</button>
          </form>
      </div>
  </main>
    <footer>
